<line x1="125.39999999999999" y1="140" x2="221.4" y2="140" stroke="#fff" stroke-width="9"/><line x1="125.39999999999999" y1="140" x2="221.4" y2="140" stroke="#dc2626" stroke-width="6"/><text x="173.39999999999998" y="132" font-size="11" font-weight="800" fill="#dc2626" text-anchor="middle">문(복도)</text>
