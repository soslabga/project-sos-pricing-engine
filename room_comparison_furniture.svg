<text x="591.8" y="40" font-size="20" font-weight="800" fill="#0f1e3d" text-anchor="middle">1인실 vs 2인실 vs 4인실 — 책상 1200×700mm 고정모듈 기준 가구배치 비교</text>
<text x="591.8" y="64" font-size="12" fill="#64748b" text-anchor="middle">문은 항상 복도쪽(위) · 책상은 문을 막지 않게 배치 · 안쪽 자리 진입 통로 확보</text>
