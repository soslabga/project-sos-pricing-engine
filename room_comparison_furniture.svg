<text x="917.1999999999999" y="314" font-size="9" fill="#a15c07" text-anchor="middle">가운데 공유통로(4명이 나눠씀, 문과 바로 연결)</text>
<text x="917.1999999999999" y="538" font-size="12" fill="#16834a" font-weight="700" text-anchor="middle">면적=9.98㎡(3.02평) → 좌우 벽에 책상, 가운데 통로를 4명이 나눠써서 인당면적 가장 작음</text>
